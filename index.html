<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AcademiX | Editorial Intelligence Dashboard</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap"

  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "outline-variant": "#464555",
            "on-surface-variant": "#c7c4d8",
            "error-container": "#93000a",
            "outline": "#918fa1",
            "surface": "#13121b",
            "on-tertiary": "#00344d",
            "on-secondary-container": "#c9aeff",
            "secondary-container": "#6001d1",
            "surface-dim": "#13121b",
            "surface-container-low": "#1b1b24",
            "surface-container": "#1f1f28",
            "surface-container-highest": "#35343e",
            "error": "#ffb4ab",
            "background": "#13121b",
            "on-background": "#e4e1ee",
            "surface-tint": "#c3c0ff",
            "surface-container-high": "#2a2933",
            "tertiary-fixed-dim": "#89ceff",
            "tertiary": "#89ceff",
            "on-secondary-fixed-variant": "#5a00c6",
            "on-secondary-fixed": "#25005a",
            "on-secondary": "#3f008e",
            "surface-variant": "#35343e",
            "on-tertiary-container": "#b8e0ff",
            "on-primary-container": "#dad7ff",
            "tertiary-container": "#006693",
            "inverse-on-surface": "#302f39",
            "on-primary-fixed": "#0f0069",
            "secondary-fixed-dim": "#d2bbff",
            "primary-fixed-dim": "#c3c0ff",
            "secondary-fixed": "#eaddff",
            "on-primary-fixed-variant": "#3323cc",
            "primary": "#c3c0ff",
            "surface-container-lowest": "#0e0d16",
            "primary-fixed": "#e2dfff",
            "secondary": "#d2bbff",
            "on-error-container": "#ffdad6",
            "primary-container": "#4f46e5",
            "on-error": "#690005",
            "on-tertiary-fixed-variant": "#004c6e",
            "inverse-primary": "#4d44e3",
            "on-tertiary-fixed": "#001e2f",
            "inverse-surface": "#e4e1ee",
            "surface-bright": "#393842",
            "on-primary": "#1d00a5",
            "on-surface": "#e4e1ee",
            "tertiary-fixed": "#c9e6ff"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "fontFamily": {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Manrope"],
            "label": ["Manrope"]
          }
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Manrope', sans-serif;
    }

    h1,
    h2,
    h3 {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .users.glass-effect {
      background: rgba(19, 18, 27, 0.6);
      backdrop-filter: blur(24px);
    }

    .headline-font {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #35343e;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div id="root" class="bg-surface text-on-surface selection:bg-primary/30"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
